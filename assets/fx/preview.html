<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reactive Rhythm — FX Flipbook Preview</title>
<style>
  :root{
    --crimson:#ff1f2e; --ember:#ff7a4a; --gold:#e0a93f;
    --chrome:#dad7d2; --violet:#a64dff; --ink:#0a0706;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--ink);color:var(--chrome);
    font-family:"Chakra Petch","Segoe UI",system-ui,sans-serif}
  header{padding:18px 22px 6px;border-bottom:1px solid #2a1b18}
  h1{margin:0;font-size:19px;letter-spacing:.04em;color:#fff;font-weight:700}
  h1 b{color:var(--crimson)}
  .sub{margin:4px 0 0;font-size:12px;color:#9a8f8a}
  .bar{display:flex;flex-wrap:wrap;gap:18px;align-items:center;
    padding:12px 22px;border-bottom:1px solid #2a1b18;font-size:12px}
  .bar .grp{display:flex;gap:6px;align-items:center}
  .bar label{color:#9a8f8a;letter-spacing:.05em;text-transform:uppercase;font-size:11px}
  button{background:#1c1310;color:var(--chrome);border:1px solid #3a2723;
    border-radius:6px;padding:5px 11px;cursor:pointer;font:inherit;font-size:12px}
  button:hover{border-color:var(--crimson)}
  button.on{background:var(--crimson);border-color:var(--crimson);color:#fff}
  #err{display:none;margin:14px 22px;padding:12px 14px;border:1px solid var(--crimson);
    border-radius:8px;background:#1a0c0c;color:#ffb3b3;font-size:13px;line-height:1.5}
  .grid{display:grid;gap:16px;padding:20px 22px 60px;
    grid-template-columns:repeat(auto-fill,minmax(190px,1fr))}
  .card{border:1px solid #2a1b18;border-radius:10px;overflow:hidden;background:#120c0a}
  .stage{position:relative;display:grid;place-items:center;padding:14px;
    background-size:18px 18px;background-position:0 0,9px 9px}
  canvas{width:160px;height:160px;image-rendering:auto;display:block}
  .meta{padding:8px 11px 11px;border-top:1px solid #221512}
  .name{font-weight:700;color:#fff;font-size:13.5px;letter-spacing:.02em}
  .name .loop{color:var(--gold);font-size:10px;border:1px solid var(--gold);
    border-radius:4px;padding:0 4px;margin-left:6px;vertical-align:middle}
  .name .once{color:#9a8f8a;font-size:10px;border:1px solid #4a3a36;
    border-radius:4px;padding:0 4px;margin-left:6px;vertical-align:middle}
  .nums{margin-top:3px;font-size:11px;color:#9a8f8a;font-family:"Oxanium",monospace}
</style>
</head>
<body>
<header>
  <h1><b>Reactive Rhythm</b> — FX Flipbook Preview</h1>
  <p class="sub">All sheets from <code>assets/fx/manifest.json</code>, rendered with their declared blend / fps / loop. One-shots replay on a short hold.</p>
</header>

<div class="bar">
  <div class="grp"><label>Background</label>
    <button data-bg="black" class="on">Black</button>
    <button data-bg="crimson">Crimson</button>
    <button data-bg="steel">Steel</button>
    <button data-bg="checker">Checker</button>
  </div>
  <div class="grp"><label>Speed</label>
    <button data-sp="0.5">0.5×</button>
    <button data-sp="1" class="on">1×</button>
    <button data-sp="2">2×</button>
  </div>
  <div class="grp"><label>Cell</label>
    <button data-cell="120">S</button>
    <button data-cell="160" class="on">M</button>
    <button data-cell="220">L</button>
  </div>
</div>

<div id="err"></div>
<div class="grid" id="grid"></div>

<script>
// Canonical data is assets/fx/manifest.json (fetched below). This inline copy is
// only a fallback so the page still works when opened via file:// (where fetch
// of a local JSON is blocked). Keep in sync if grid geometry changes.
const FALLBACK = {
  "hit-burst":{src:"assets/fx/hit-burst.png",frameW:128,frameH:128,cols:4,rows:4,count:16,fps:30,blend:"lighter",loop:false,scale:0.9},
  "perfect-flare":{src:"assets/fx/perfect-flare.png",frameW:128,frameH:128,cols:5,rows:4,count:20,fps:30,blend:"lighter",loop:false,scale:1.2},
  "explosion":{src:"assets/fx/explosion.png",frameW:128,frameH:128,cols:7,rows:4,count:28,fps:30,blend:"lighter",loop:false,scale:1.6},
  "shockwave":{src:"assets/fx/shockwave.png",frameW:128,frameH:128,cols:4,rows:4,count:16,fps:30,blend:"lighter",loop:false,scale:1.4},
  "fire-loop":{src:"assets/fx/fire-loop.png",frameW:128,frameH:128,cols:6,rows:4,count:24,fps:24,blend:"lighter",loop:true,scale:1.5},
  "miss-shatter":{src:"assets/fx/miss-shatter.png",frameW:128,frameH:128,cols:4,rows:4,count:16,fps:24,blend:"lighter",loop:false,scale:1.0},
  "soulwisp-violet":{src:"assets/fx/soulwisp-violet.png",frameW:128,frameH:128,cols:6,rows:4,count:24,fps:14,blend:"lighter",loop:true,scale:1.2},
  "combo-burst":{src:"assets/fx/combo-burst.png",frameW:128,frameH:128,cols:5,rows:4,count:20,fps:30,blend:"lighter",loop:false,scale:1.3},
  "multiplier-up":{src:"assets/fx/multiplier-up.png",frameW:128,frameH:128,cols:4,rows:4,count:16,fps:30,blend:"lighter",loop:false,scale:1.0},
  "note-comet":{src:"assets/fx/note-comet.png",frameW:128,frameH:128,cols:4,rows:4,count:16,fps:30,blend:"lighter",loop:false,scale:0.9},
  "star-pickup":{src:"assets/fx/star-pickup.png",frameW:128,frameH:128,cols:6,rows:3,count:18,fps:30,blend:"lighter",loop:false,scale:1.0},
  "gradeup-flare":{src:"assets/fx/gradeup-flare.png",frameW:128,frameH:128,cols:6,rows:4,count:24,fps:30,blend:"lighter",loop:false,scale:1.6},
  "bomb-explode":{src:"assets/fx/bomb-explode.png",frameW:128,frameH:128,cols:6,rows:4,count:24,fps:30,blend:"lighter",loop:false,scale:1.5},
  "overdrive-aura":{src:"assets/fx/overdrive-aura.png",frameW:128,frameH:128,cols:6,rows:4,count:24,fps:24,blend:"lighter",loop:true,scale:1.6},
  "charge-loop":{src:"assets/fx/charge-loop.png",frameW:128,frameH:128,cols:6,rows:4,count:24,fps:24,blend:"lighter",loop:true,scale:1.2},
  "ember-rise":{src:"assets/fx/ember-rise.png",frameW:128,frameH:128,cols:6,rows:4,count:24,fps:20,blend:"lighter",loop:true,scale:1.6},
  "chrome-pulse-ring":{src:"assets/fx/chrome-pulse-ring.png",frameW:128,frameH:128,cols:4,rows:4,count:16,fps:24,blend:"lighter",loop:true,scale:1.0},
  "lane-pulse":{src:"assets/fx/lane-pulse.png",frameW:128,frameH:128,cols:4,rows:4,count:16,fps:30,blend:"lighter",loop:false,scale:1.0},
  "string-ripple":{src:"assets/fx/string-ripple.png",frameW:128,frameH:128,cols:4,rows:4,count:16,fps:30,blend:"lighter",loop:false,scale:1.0},
  "shard-burst":{src:"assets/fx/shard-burst.png",frameW:128,frameH:128,cols:5,rows:4,count:20,fps:30,blend:"lighter",loop:false,scale:1.3},
  "skull-flame-violet":{src:"assets/fx/skull-flame-violet.png",frameW:128,frameH:128,cols:6,rows:4,count:24,fps:24,blend:"lighter",loop:true,scale:1.4},
  "soul-burst-violet":{src:"assets/fx/soul-burst-violet.png",frameW:128,frameH:128,cols:5,rows:4,count:20,fps:30,blend:"lighter",loop:false,scale:1.3},
  "bone-shatter":{src:"assets/fx/bone-shatter.png",frameW:128,frameH:128,cols:5,rows:4,count:20,fps:30,blend:"lighter",loop:false,scale:1.3},
  "ember-skull-loop":{src:"assets/fx/ember-skull-loop.png",frameW:128,frameH:128,cols:6,rows:4,count:24,fps:24,blend:"lighter",loop:true,scale:1.4},
  "note-sparkle-pink":{src:"assets/fx/note-sparkle-pink.png",frameW:128,frameH:128,cols:6,rows:3,count:18,fps:30,blend:"lighter",loop:false,scale:1.0},
  "heart-pop-pink":{src:"assets/fx/heart-pop-pink.png",frameW:128,frameH:128,cols:4,rows:4,count:16,fps:30,blend:"lighter",loop:false,scale:1.0},
  "paw-poof":{src:"assets/fx/paw-poof.png",frameW:128,frameH:128,cols:4,rows:4,count:16,fps:24,blend:"lighter",loop:false,scale:1.0},
  "confetti-pop":{src:"assets/fx/confetti-pop.png",frameW:128,frameH:128,cols:6,rows:4,count:24,fps:30,blend:"lighter",loop:false,scale:1.6},
  "firework-gold":{src:"assets/fx/firework-gold.png",frameW:128,frameH:128,cols:6,rows:4,count:24,fps:30,blend:"lighter",loop:false,scale:1.6}
};

const BG = {
  black:   {fill:"#0a0706", checker:false},
  crimson: {fill:"#2a0608", checker:false},
  steel:   {fill:"#3b3a38", checker:false},
  checker: {fill:"#141414", checker:true}
};

let speed = 1, cellPx = 160, bgKey = "black";
const players = [];

function basename(p){ return p.split("/").pop(); }

// One animator per effect. now() is passed in so all cards share a clock.
function makePlayer(meta, img, canvas){
  const ctx = canvas.getContext("2d");
  const dpr = Math.min(2, window.devicePixelRatio || 1);
  function size(){
    canvas.style.width = cellPx+"px"; canvas.style.height = cellPx+"px";
    canvas.width = Math.round(cellPx*dpr); canvas.height = Math.round(cellPx*dpr);
  }
  size();
  const HOLD_MS = 320; // pause on last frame for one-shots before replaying
  let start = null;
  function frameAt(t){
    if(start === null) start = t;
    const elapsed = (t - start) * speed;
    const dur = 1000 / meta.fps;
    let f = Math.floor(elapsed / dur);
    if(meta.loop){ return ((f % meta.count) + meta.count) % meta.count; }
    if(f >= meta.count){
      // one-shot finished: hold last frame, then restart the cycle
      const over = elapsed - meta.count*dur;
      if(over >= HOLD_MS){ start = t; return 0; }
      return meta.count - 1;
    }
    return f;
  }
  function draw(t){
    const f = frameAt(t);
    const bg = BG[bgKey];
    ctx.globalCompositeOperation = "source-over";
    if(bg.checker){
      const s = 10*dpr;
      for(let y=0;y<canvas.height;y+=s){ for(let x=0;x<canvas.width;x+=s){
        ctx.fillStyle = ((x/s+y/s)&1) ? "#0e0e0e" : "#242424";
        ctx.fillRect(x,y,s,s);
      }}
    } else {
      ctx.fillStyle = bg.fill; ctx.fillRect(0,0,canvas.width,canvas.height);
    }
    // additive composite of the on-black frame — exactly how the game draws it
    ctx.globalCompositeOperation = meta.blend === "lighter" ? "lighter" : "source-over";
    const sx = (f % meta.cols) * meta.frameW;
    const sy = Math.floor(f / meta.cols) * meta.frameH;
    ctx.drawImage(img, sx, sy, meta.frameW, meta.frameH, 0, 0, canvas.width, canvas.height);
  }
  return { meta, draw, resize:size };
}

function loop(t){
  for(const p of players) p.draw(t);
  requestAnimationFrame(loop);
}

function build(manifest){
  const grid = document.getElementById("grid");
  const names = Object.keys(manifest);
  let pending = names.length;
  names.forEach(name=>{
    const meta = manifest[name];
    const card = document.createElement("div"); card.className = "card";
    const stage = document.createElement("div"); stage.className = "stage";
    stage.style.background = BG[bgKey].fill;
    const cv = document.createElement("canvas"); stage.appendChild(cv);
    const m = document.createElement("div"); m.className = "meta";
    m.innerHTML = '<div class="name">'+name+
      (meta.loop?'<span class="loop">LOOP</span>':'<span class="once">ONE-SHOT</span>')+'</div>'+
      '<div class="nums">'+meta.count+' frames · '+meta.fps+' fps · '+
      meta.cols+'×'+meta.rows+' · '+meta.blend+'</div>';
    card.appendChild(stage); card.appendChild(m); grid.appendChild(card);

    const img = new Image();
    img.onload = ()=>{ players.push(makePlayer(meta, img, cv)); if(--pending===0) start(); };
    img.onerror = ()=>{ stage.innerHTML = '<span style="color:#ffb3b3;font-size:12px">missing '+basename(meta.src)+'</span>'; if(--pending===0) start(); };
    img.src = basename(meta.src); // PNGs sit next to this file
  });
}

let started = false;
function start(){ if(started) return; started = true; requestAnimationFrame(loop); }

// Dev hook: lets a headless harness drive draws manually (rAF is throttled when
// the tab is idle/backgrounded) and confirm rendering. Harmless in normal use.
window.__errs = [];
addEventListener("error", e => window.__errs.push(String(e.message || e)));
window.__fx = {
  draw(t){ t = t || performance.now(); players.forEach(p => p.draw(t)); return players.length; },
  count(){ return players.length; }
};

function applyBg(){
  document.querySelectorAll(".stage").forEach(s=>{ s.style.background = BG[bgKey].fill; });
}

// controls
document.querySelector(".bar").addEventListener("click", e=>{
  const b = e.target.closest("button"); if(!b) return;
  if(b.dataset.bg){ bgKey = b.dataset.bg; setOn(b); applyBg(); }
  if(b.dataset.sp){ speed = parseFloat(b.dataset.sp); setOn(b); }
  if(b.dataset.cell){ cellPx = parseInt(b.dataset.cell,10); setOn(b); players.forEach(p=>p.resize()); }
});
function setOn(b){ b.parentElement.querySelectorAll("button").forEach(x=>x.classList.remove("on")); b.classList.add("on"); }

// load manifest (canonical), fall back to inline copy for file://
fetch("manifest.json").then(r=>{ if(!r.ok) throw 0; return r.json(); })
  .then(build)
  .catch(()=>{
    const e = document.getElementById("err");
    e.style.display = "block";
    e.innerHTML = "Couldn't fetch <code>manifest.json</code> (you likely opened this via file://). "+
      "Using the inline fallback. For the live manifest, serve the repo: "+
      "<code>python serve.py</code> → <code>http://localhost:8787/assets/fx/preview.html</code>";
    build(FALLBACK);
  });
</script>
</body>
</html>
